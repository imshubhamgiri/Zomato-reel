version: '3.9'

services:
  backend:
    build: ./backend
    container_name: express-server
    ports:
      - "3000:3000"
    networks:
      - fullstack-net
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - NODE_ENV=development
  frontend:
    build: ./frontend 
    container_name: react-app
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
    networks:
      - fullstack-net
    depends_on:
      - backend
    restart: unless-stopped
  database:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zomato
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:

  networks:
  fullstack-net:
    driver: bridge
      