version: "3.9"

services:
  backend:
    build: ./backend
    container_name: zomato-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/zomato
    depends_on:
      - mongo
    networks:
      - fullstack-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: zomato-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - fullstack-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: zomato-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fullstack-net
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  fullstack-net:
    driver: bridge
